# Configuration PHP recommandée pour DomPDF
# Ajouter ces paramètres à php.ini ou .htaccess si sur serveur web

# === php.ini ===
# Augmenter la limite de mémoire pour DomPDF
memory_limit = 512M

# Augmenter le timeout d'exécution pour PDFs volumineux  
max_execution_time = 120

# Augmenter la limite POST pour uploads (au cas où)
post_max_size = 100M
upload_max_filesize = 100M

# === .htaccess (si php.ini non accessible) ===
# Copier les lignes suivantes dans .htaccess (public/.htaccess ou root)

php_value memory_limit 512M
php_value max_execution_time 120
php_value post_max_size 100M
php_value upload_max_filesize 100M

# === Configuration Laravel .env (recommandé) ===
# Si vous voulez passer ces paramètres via Laravel:

# Dans config/php_ini.php ou directement dans contrôleur (comme déjà fait):
ini_set('memory_limit', '512M');
ini_set('max_execution_time', 120);

# === Vérification des Paramètres Current ===
# Exécuter pour vérifier:

php -i | grep -E "memory_limit|max_execution_time|post_max_size|upload_max_filesize"

# === Redémarrage PHP ===
# Après modification de php.ini, redémarrer PHP:

# Pour Apache + mod_php:
sudo systemctl restart apache2

# Pour Nginx + PHP-FPM:
sudo systemctl restart php-fpm
sudo systemctl restart nginx

# Pour WAMP (Windows):
WAMP > PHP > php.ini (éditer directement)
Puis redémarrer depuis WAMP Tray

# === Test de Configuration ===
# Créer un fichier test.php avec:

<?php phpinfo(); ?>

# Puis accéder via navigateur pour vérifier les paramètres
